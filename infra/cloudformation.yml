AWSTemplateFormatVersion: '2010-09-09'
Description: Satellite Telemetry Dashboard local-style AWS POC infrastructure.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC containing a public subnet for the EC2 instance.
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet with a route to an internet gateway.
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
    Description: Small single-instance size suitable for this POC.
  ComposeVersion:
    Type: String
    Default: v2.39.2
    Description: Docker Compose plugin version used when the AMI package is unavailable.
  GitHubRepository:
    Type: String
    Default: SinisterGiant/SatelliteTelemetryDashboard
    Description: owner/repository trusted by the GitHub Actions OIDC role.
  GitHubBranch:
    Type: String
    Default: main
    Description: Branch allowed to assume the GitHub Actions role.
  BackendRepositoryName:
    Type: String
    Default: satellite-telemetry-backend
  FrontendRepositoryName:
    Type: String
    Default: satellite-telemetry-frontend

Resources:
  DashboardSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public HTTP access for CloudFront to the dashboard.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: CloudFront and browser HTTP origin access.
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  DashboardInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly

  DashboardInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref DashboardInstanceRole

  DashboardInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      InstanceType: !Ref InstanceType
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref DashboardSecurityGroup
      IamInstanceProfile: !Ref DashboardInstanceProfile
      Tags:
        - Key: Name
          Value: satellite-telemetry-dashboard
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          dnf install -y docker
          systemctl enable --now docker
          if ! docker compose version >/dev/null 2>&1; then
            install -d -m 0755 /usr/local/lib/docker/cli-plugins
            curl --fail --silent --show-error --location \
              https://github.com/docker/compose/releases/download/${ComposeVersion}/docker-compose-linux-x86_64 \
              --output /usr/local/lib/docker/cli-plugins/docker-compose
            chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
          fi
          systemctl enable --now amazon-ssm-agent || true
          usermod -aG docker ec2-user
          mkdir -p /opt/satellite-telemetry
          chown -R ec2-user:ec2-user /opt/satellite-telemetry

  DashboardElasticIp:
    Type: AWS::EC2::EIP
    DependsOn: DashboardInstance
    Properties:
      Domain: vpc
      InstanceId: !Ref DashboardInstance
      Tags:
        - Key: Name
          Value: satellite-telemetry-dashboard

  BackendRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref BackendRepositoryName
      ImageTagMutability: IMMUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: '{"rules":[{"rulePriority":1,"description":"Retain the ten newest images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":10},"action":{"type":"expire"}}]}'

  FrontendRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref FrontendRepositoryName
      ImageTagMutability: IMMUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: '{"rules":[{"rulePriority":1,"description":"Retain the ten newest images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":10},"action":{"type":"expire"}}]}'

  GitHubActionsOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub satellite-telemetry-github-actions-${AWS::Region}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubActionsOidcProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubRepository}:ref:refs/heads/${GitHubBranch}
      Policies:
        - PolicyName: DeploySatelliteTelemetry
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                Resource:
                  - !GetAtt BackendRepository.Arn
                  - !GetAtt FrontendRepository.Arn
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                Resource:
                  - !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:document/AWS-RunShellScript
                  - !Sub arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:instance/${DashboardInstance}
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource: !Sub arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/*

  DashboardCloudFront:
    Type: AWS::CloudFront::Distribution
    DependsOn:
      - DashboardElasticIp
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Satellite Telemetry Dashboard POC
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100
        Origins:
          - Id: dashboard-ec2-origin
            DomainName: !GetAtt DashboardInstance.PublicDnsName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: dashboard-ec2-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: false
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: dashboard-ec2-origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - PATCH
              - POST
              - DELETE
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            Compress: true
            ForwardedValues:
              QueryString: true
              Headers:
                - Accept
                - Content-Type
                - Origin
                - User-Agent
              Cookies:
                Forward: none
            MinTTL: 0
            DefaultTTL: 0
            MaxTTL: 0

Outputs:
  DashboardUrl:
    Description: Public HTTPS dashboard URL.
    Value: !Sub https://${DashboardCloudFront.DomainName}
  CloudFrontDistributionId:
    Description: Distribution ID used for cache invalidation.
    Value: !Ref DashboardCloudFront
  InstanceId:
    Description: EC2 instance ID used by the deployment workflow.
    Value: !Ref DashboardInstance
  EcrRegistry:
    Description: ECR registry hostname.
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.${AWS::URLSuffix}
  BackendRepositoryUri:
    Value: !GetAtt BackendRepository.RepositoryUri
  FrontendRepositoryUri:
    Value: !GetAtt FrontendRepository.RepositoryUri
  GitHubActionsRoleArn:
    Description: IAM role ARN configured in GitHub Actions.
    Value: !GetAtt GitHubActionsDeployRole.Arn
